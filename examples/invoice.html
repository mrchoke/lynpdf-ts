<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Example</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .invoice-box { max-width: 800px; margin: auto; padding: 30px; border: 1px solid #eee; box-shadow: 0 0 10px rgba(0, 0, 0, 0.15); }
        .invoice-header { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .invoice-table th, .invoice-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .invoice-table th { background-color: #f8f8f8; font-family: 'Prompt', sans-serif; }
        .invoice-table .total-row td { font-weight: bold; background-color: #f4f4f4; }
    </style>
</head>
<body>
    <div class="invoice-box">
        <div class="invoice-header">
            <div>
                <!-- Inline SVG Logo -->
                <svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="blue" />
                    <text x="50" y="55" font-size="20" text-anchor="middle" fill="white">LOGO</text>
                </svg>
                <h2>Acme Corp</h2>
            </div>
            <div class="text-right">
                <h3>INVOICE #12345</h3>
                <p>Date: February 22, 2026<br>Due Date: March 22, 2026</p>
            </div>
        </div>

        <table class="invoice-table">
            <thead>
                <tr>
                    <th>Item Description</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Web Development Services</td>
                    <td>1</td>
                    <td>$1,500.00</td>
                    <td>$1,500.00</td>
                </tr>
                <tr>
                    <td>Server Hosting (1 Year)</td>
                    <td>12</td>
                    <td>$50.00</td>
                    <td>$600.00</td>
                </tr>
                <tr>
                    <td colspan="3" class="text-right">Subtotal</td>
                    <td>$2,100.00</td>
                </tr>
                <tr>
                    <td colspan="3" class="text-right">Tax (7%)</td>
                    <td>$147.00</td>
                </tr>
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="3" class="text-right">Grand Total</td>
                    <td>$2,247.00</td>
                </tr>
            </tfoot>
        </table>
    </div>
</body>
</html>
